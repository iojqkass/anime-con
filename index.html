<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AniCon - 二次元漫展资讯</title>
<style>
:root{
--pink: #e8a0bf; --pink-deep: #c77dba; --blue-light: #a8d8ea; --yellow: #f5d782;
--orange: #f0a868; --bg: #f7f4fa; --card-bg: #ffffff; --text: #3a2d40;
--text-secondary: #7a6e82; --text-muted: #a89bb0; --shadow: 0 2px 12px rgba(200,160,190,0.15);
--radius: 14px; --tag-radius: 20px; --nav-height: 64px;
--safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh;user-select:none;-webkit-user-select:none;}
#app{width:100%;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;}

/* Stars decoration */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;background:var(--pink);border-radius:50%;opacity:0;animation:twinkle var(--d) ease-in-out infinite;animation-delay:var(--delay);}
.star:nth-child(odd){background:var(--blue-light);}
.star:nth-child(3n){background:var(--yellow);}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5);}50%{opacity:0.6;transform:scale(1);}}

/* Page container */
.page-container{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:1;padding-bottom:calc(var(--nav-height) + var(--safe-bottom) + 16px);-webkit-overflow-scrolling:touch;}
.page{display:none;padding:16px;animation:fadeIn .3s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:8px 0 12px;}
.section-title{font-size:18px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:4px;height:18px;background:linear-gradient(180deg,var(--pink-deep),var(--pink));border-radius:2px;}
.section-more{font-size:13px;color:var(--pink-deep);cursor:pointer;}

/* Cards */
.card{border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;overflow:hidden;}
.card:active{transform:scale(0.98);box-shadow:0 1px 6px rgba(200,160,190,0.1);}
.card-white{background:var(--card-bg);}
.card-gradient{background:linear-gradient(135deg,rgba(232,160,191,0.15),rgba(168,216,234,0.15));backdrop-filter:blur(4px);}
.card-accent{border-left:3px solid var(--pink-deep);}

/* Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:var(--tag-radius);font-size:11px;font-weight:500;margin-right:6px;margin-bottom:4px;white-space:nowrap;}
.tag-pink{background:rgba(232,160,191,0.2);color:#b05a85;}
.tag-blue{background:rgba(168,216,234,0.3);color:#5a8ca0;}
.tag-yellow{background:rgba(245,215,130,0.3);color:#b08630;}
.tag-orange{background:rgba(240,168,104,0.25);color:#b87030;}
.tag-purple{background:rgba(199,125,186,0.2);color:#8a5090;}
.tag-green{background:rgba(144,200,172,0.25);color:#5a9070;}

/* Price highlight */
.price{color:#e87850;font-weight:700;font-size:17px;}
.price-ref{color:var(--text-muted);font-size:12px;text-decoration:line-through;margin-left:4px;}
.price-off{color:#e87850;font-size:11px;font-weight:600;background:rgba(232,120,80,0.1);padding:1px 6px;border-radius:10px;margin-left:6px;}

/* Buttons */
.btn{padding:10px 24px;border-radius:24px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--pink-deep),var(--pink));color:#fff;}
.btn-primary:active{opacity:0.85;}
.btn-outline{border:1.5px solid var(--pink-deep);color:var(--pink-deep);background:transparent;}
.btn-outline:active{background:rgba(199,125,186,0.08);}
.btn-ghost{background:transparent;color:var(--text-secondary);}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(200,180,200,0.2);display:flex;justify-content:space-around;align-items:center;padding:6px 8px calc(6px + var(--safe-bottom));height:calc(var(--nav-height) + var(--safe-bottom));}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 10px;transition:all .2s;position:relative;}
.nav-icon{font-size:22px;color:var(--text-muted);transition:color .2s;}
.nav-label{font-size:10px;color:var(--text-muted);font-weight:500;transition:color .2s;}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--pink-deep);}
.nav-item.active::after{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--pink-deep);border-radius:0 0 3px 3px;}

/* Splash page */
.splash-bg{background:linear-gradient(160deg,#f0e4f6 0%,#e8d4ee 25%,#dce8f4 50%,#e8f2f8 75%,#f0e4f6 100%);min-height:100vh;position:relative;overflow:hidden;padding:0;}
.splash-inner{padding:16px;position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
.splash-logo{text-align:center;margin:24px 0 8px;}
.splash-logo-text{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--pink-deep),#9b6db5,var(--blue-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.splash-subtitle{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:4px;}
.splash-carousel{flex:1;position:relative;margin:12px 0;overflow:hidden;}
.splash-card-wrap{position:absolute;top:0;left:0;width:100%;transition:all .4s cubic-bezier(0.4,0,0.2,1);opacity:0;transform:translateX(40px) scale(0.92);pointer-events:none;}
.splash-card-wrap.active{opacity:1;transform:translateX(0) scale(1);pointer-events:auto;position:relative;}
.splash-card-wrap.prev{opacity:0;transform:translateX(-40px) scale(0.92);}
.splash-card{background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);border-radius:18px;padding:20px;box-shadow:0 8px 32px rgba(180,130,170,0.18);}
.splash-card .card-tag-row{margin-bottom:10px;}
.splash-card .card-title{font-size:19px;font-weight:700;margin-bottom:8px;line-height:1.4;}
.splash-card .card-desc{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:12px;}
.splash-card .card-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-muted);}
.splash-dots{display:flex;justify-content:center;gap:8px;margin:12px 0;}
.splash-dot{width:8px;height:8px;border-radius:50%;background:#d0c0d8;transition:all .3s;}
.splash-dot.active{background:var(--pink-deep);width:24px;border-radius:4px;}
.splash-actions{display:flex;gap:12px;margin-top:8px;padding-bottom:24px;}
.splash-actions .btn{flex:1;text-align:center;}

/* Hot topics page filter */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;-ms-overflow-style:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{padding:7px 16px;border-radius:18px;font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .2s;background:rgba(220,210,230,0.4);color:var(--text-secondary);border:1px solid transparent;}
.filter-chip.active{background:var(--pink-deep);color:#fff;border-color:var(--pink-deep);}
.sort-row{display:flex;gap:12px;margin-bottom:12px;font-size:13px;color:var(--text-secondary);}
.sort-item{cursor:pointer;padding:2px 0;border-bottom:2px solid transparent;transition:all .2s;}
.sort-item.active{color:var(--pink-deep);border-bottom-color:var(--pink-deep);font-weight:600;}

/* Topic card */
.topic-card .topic-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.topic-card .topic-title{font-size:16px;font-weight:600;flex:1;line-height:1.4;}
.topic-card .topic-stats{display:flex;gap:12px;font-size:11px;color:var(--text-muted);margin-top:4px;}
.topic-card .topic-comment{background:rgba(200,180,210,0.15);border-radius:10px;padding:10px 12px;margin:8px 0;font-size:13px;color:var(--text-secondary);line-height:1.5;position:relative;}
.topic-card .topic-comment::before{content:'"';font-size:24px;color:var(--pink);position:absolute;left:6px;top:2px;opacity:0.5;}
.topic-card .topic-comment{padding-left:20px;}
.topic-card .topic-footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-muted);}

/* Events page */
.month-header{font-size:16px;font-weight:700;color:var(--pink-deep);margin:8px 0 12px;padding:6px 14px;background:rgba(232,160,191,0.1);border-radius:10px;display:inline-block;}
.event-card .event-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.event-card .event-name{font-size:17px;font-weight:700;flex:1;line-height:1.3;}
.countdown{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;background:rgba(240,168,104,0.2);color:#c86030;white-space:nowrap;}
.event-card .event-info{font-size:12px;color:var(--text-secondary);margin:4px 0;line-height:1.5;}
.event-card .guest-row{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0;}
.event-card .guest-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;background:rgba(168,216,234,0.25);color:#5a8ca0;}
.event-card .event-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.event-card .event-flow{font-size:11px;color:var(--text-muted);display:flex;gap:6px;flex-wrap:wrap;}
.event-card .event-flow span{padding:2px 8px;background:rgba(200,180,210,0.15);border-radius:8px;}
.event-card .ticket-btn{padding:6px 16px;border-radius:16px;font-size:12px;font-weight:600;background:linear-gradient(135deg,var(--pink-deep),var(--pink));color:#fff;border:none;cursor:pointer;}

/* Anime page */
.anime-card{display:flex;gap:14px;}
.anime-cover{width:80px;height:110px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:700;}
.anime-cover.c1{background:linear-gradient(135deg,#e8a0bf,#c77dba);}
.anime-cover.c2{background:linear-gradient(135deg,#a8d8ea,#6bb5d0);}
.anime-cover.c3{background:linear-gradient(135deg,#f5d782,#e8b84e);}
.anime-cover.c4{background:linear-gradient(135deg,#f0a868,#d87840);}
.anime-cover.c5{background:linear-gradient(135deg,#a0d8c0,#60a878);}
.anime-cover.c6{background:linear-gradient(135deg,#c0b0e0,#9078c8);}
.anime-info{flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.anime-info .anime-name{font-size:16px;font-weight:700;line-height:1.3;}
.anime-info .anime-desc{font-size:12px;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.anime-info .anime-meta{font-size:11px;color:var(--text-muted);display:flex;gap:10px;align-items:center;}
.status-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;}
.status-airing{background:rgba(144,200,172,0.3);color:#407860;}
.status-done{background:rgba(180,160,200,0.25);color:#706090;}

/* Coser page (sub-page overlay) */
.sub-page{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;background:var(--bg);overflow-y:auto;display:none;padding-bottom:16px;-webkit-overflow-scrolling:touch;}
.sub-page.active{display:block;animation:slideIn .35s ease;}
@keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
.sub-page-header{display:flex;align-items:center;padding:12px 16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(200,180,200,0.15);}
.back-btn{width:36px;height:36px;border-radius:50%;background:rgba(220,210,230,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text);margin-right:12px;}
.sub-page-title{font-size:17px;font-weight:700;flex:1;}
.waterfall{column-count:2;column-gap:12px;padding:12px 16px;}
.waterfall-item{break-inside:avoid;margin-bottom:12px;border-radius:var(--radius);overflow:hidden;background:var(--card-bg);box-shadow:var(--shadow);cursor:pointer;transition:transform .2s;}
.waterfall-item:active{transform:scale(0.97);}
.waterfall-img{width:100%;display:block;min-height:140px;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;font-weight:700;}
.waterfall-img.w1{background:linear-gradient(135deg,#e8a0bf,#d0809a);min-height:180px;}
.waterfall-img.w2{background:linear-gradient(135deg,#a8d8ea,#78b8d0);min-height:140px;}
.waterfall-img.w3{background:linear-gradient(135deg,#f5d782,#d8b850);min-height:160px;}
.waterfall-img.w4{background:linear-gradient(135deg,#c0b0e0,#9888c0);min-height:200px;}
.waterfall-img.w5{background:linear-gradient(135deg,#f0a868,#d07848);min-height:150px;}
.waterfall-img.w6{background:linear-gradient(135deg,#a0d8c0,#68a878);min-height:170px;}
.waterfall-info{padding:10px 12px;}
.waterfall-info .wf-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.waterfall-info .wf-tag{font-size:10px;color:var(--text-muted);}

/* Deals page */
.deal-card{display:flex;gap:12px;align-items:stretch;}
.deal-img{width:90px;min-height:90px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;font-weight:700;}
.deal-img.d1{background:linear-gradient(135deg,#d0c0e0,#a888c8);}
.deal-img.d2{background:linear-gradient(135deg,#f5d782,#e0b840);}
.deal-img.d3{background:linear-gradient(135deg,#a8d8ea,#68b0d0);}
.deal-img.d4{background:linear-gradient(135deg,#e8a0bf,#c068a0);}
.deal-img.d5{background:linear-gradient(135deg,#a0d8c0,#58a070);}
.deal-info{flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.deal-info .deal-title{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:6px;}
.deal-info .deal-tags{margin-bottom:6px;}
.deal-info .deal-price-row{display:flex;align-items:baseline;gap:6px;margin-top:4px;}
.deal-info .deal-source{font-size:10px;color:var(--text-muted);margin-top:4px;}

/* Home page cards */
.home-module{margin-bottom:20px;}
.home-module .module-title{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;}

/* WebView overlay */
.webview-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;background:rgba(0,0,0,0.4);display:none;align-items:flex-end;justify-content:center;}
.webview-overlay.active{display:flex;animation:fadeInOverlay .25s ease;}
@keyframes fadeInOverlay{from{opacity:0;}to{opacity:1;}}
.webview-panel{width:100%;max-height:85%;background:#fff;border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .35s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.webview-header{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f0e8f4;background:#faf8fd;}
.webview-header .wv-back{width:32px;height:32px;border-radius:50%;background:rgba(220,210,230,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;margin-right:12px;}
.webview-header .wv-title{font-size:16px;font-weight:700;flex:1;}
.webview-header .wv-source{font-size:11px;color:var(--text-muted);}
.webview-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch;}
.webview-body .wv-placeholder{text-align:center;padding:40px 0;color:var(--text-secondary);}
.webview-body .wv-placeholder .wv-icon{font-size:48px;margin-bottom:16px;}
.webview-body .wv-placeholder .wv-msg{font-size:14px;}
.webview-body .wv-link{display:inline-block;margin-top:12px;padding:8px 20px;background:linear-gradient(135deg,var(--pink-deep),var(--pink));color:#fff;border-radius:20px;font-size:13px;text-decoration:none;}

/* Horizontal scroll card list */
.hscroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:4px 0;}
.hscroll::-webkit-scrollbar{display:none;}
.hscroll-card{min-width:140px;border-radius:var(--radius);padding:12px;background:var(--card-bg);box-shadow:var(--shadow);cursor:pointer;flex-shrink:0;transition:transform .2s;}
.hscroll-card:active{transform:scale(0.96);}
.hscroll-card .hsc-cover{width:100%;height:80px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;}

/* Bubble decoration */
.bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.bubble{position:absolute;border-radius:50%;opacity:0.15;animation:floatBubble var(--dur) ease-in-out infinite;animation-delay:var(--delay);}
@keyframes floatBubble{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.15);}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="bubbles" id="bubbles"></div>
<div id="app">
<div class="page-container" id="pageContainer">

<!-- Splash Page -->
<div class="page splash-bg active" id="page-splash">
<div class="splash-inner">
<div class="splash-logo"><div class="splash-logo-text">AniCon</div></div>
<div class="splash-subtitle">发现最热二次元资讯</div>
<div class="splash-carousel" id="splashCarousel"></div>
<div class="splash-dots" id="splashDots"></div>
<div class="splash-actions">
<button class="btn btn-ghost" onclick="enterApp()">跳过</button>
<button class="btn btn-primary" onclick="enterApp()">进入首页</button>
</div>
</div>
</div>

<!-- Home Page -->
<div class="page" id="page-home"></div>

<!-- Events Page -->
<div class="page" id="page-events"></div>

<!-- Topics Page -->
<div class="page" id="page-topics"></div>

<!-- Anime Page -->
<div class="page" id="page-anime"></div>

<!-- Deals Page -->
<div class="page" id="page-deals"></div>

</div>

<!-- Coser Sub Page -->
<div class="sub-page" id="subCoser">
<div class="sub-page-header">
<div class="back-btn" onclick="closeSubPage()">&#8592;</div>
<div class="sub-page-title">Coser 分享</div>
</div>
<div class="filter-row" style="padding:12px 16px 4px;" id="coserFilterRow"></div>
<div class="waterfall" id="coserWaterfall"></div>
</div>

<!-- WebView Overlay -->
<div class="webview-overlay" id="webviewOverlay" onclick="if(event.target===this)closeWebView()">
<div class="webview-panel">
<div class="webview-header">
<div class="wv-back" onclick="closeWebView()">&#8592;</div>
<div class="wv-title" id="wvTitle">详情</div>
<div class="wv-source" id="wvSource"></div>
</div>
<div class="webview-body" id="wvBody"></div>
</div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav" id="bottomNav">
<div class="nav-item active" data-page="splash" onclick="switchTab('splash')">
<div class="nav-icon">&#9733;</div>
<div class="nav-label">首页</div>
</div>
<div class="nav-item" data-page="events" onclick="switchTab('events')">
<div class="nav-icon">&#9734;</div>
<div class="nav-label">漫展</div>
</div>
<div class="nav-item" data-page="topics" onclick="switchTab('topics')">
<div class="nav-icon">&#9830;</div>
<div class="nav-label">话题</div>
</div>
<div class="nav-item" data-page="anime" onclick="switchTab('anime')">
<div class="nav-icon">&#9829;</div>
<div class="nav-label">番剧</div>
</div>
<div class="nav-item" data-page="deals" onclick="switchTab('deals')">
<div class="nav-icon">&#9827;</div>
<div class="nav-label">好物</div>
</div>
</nav>
</div>

<script>
// ===== DATA =====

dots.innerHTML=splashTopics.map((_,i)=>`<div class="splash-dot${i===splashIndex?' active':''}" onclick="goSplash(${i})"></div>`).join('');
}
function goSplash(i){splashIndex=i;renderSplash();resetSplashTimer();}

if(coserFilter!=='all') filtered=coserData.filter(c=>c.tags.includes(coserFilter));
document.getElementById('coserFilterRow').innerHTML=filters.map(f=>`<div class="filter-chip${coserFilter===f?' active':''}" onclick="coserFilter='${f}';renderCoserPage();">${filterNames[f]}</div>`).join('');
document.getElementById('coserWaterfall').innerHTML=filtered.map(c=>`<div class="waterfall-item" onclick="openWebView('${escapeHtml(c.name)}','${escapeHtml(c.source)}')">
<div class="waterfall-img ${c.imgClass}">&#128247;</div>
<div class="waterfall-info"><div class="wf-name">${c.name}</div><div class="wf-tag">${c.tags.join(' · ')}</div><div class="wf-tag" style="margin-top:2px;">${c.source}</div></div>
</div>`).join('');
}

// ===== DEALS PAGE =====
function renderDeals(){
const el=document.getElementById('page-deals');
const filters=['all','手办','挂画','徽章','服饰'];
const filterNames={all:'全部',手办:'手办',挂画:'挂画',徽章:'徽章',服饰:'服饰'};
let filtered=dealData;
if(dealsFilter!=='all') filtered=dealData.filter(d=>d.tags.includes(dealsFilter));
el.innerHTML=`
<div class="filter-row">${filters.map(f=>`<div class="filter-chip${dealsFilter===f?' active':''}" onclick="dealsFilter='${f}';renderDeals();">${filterNames[f]}</div>`).join('')}</div>
<div class="sort-row"><span class="sort-item${dealsSort==='price'?' active':''}" onclick="dealsSort='price';renderDeals();">按价格</span><span class="sort-item${dealsSort==='new'?' active':''}" onclick="dealsSort='new';renderDeals();">按发布时间</span><span class="sort-item${dealsSort==='off'?' active':''}" onclick="dealsSort='off';renderDeals();">按价格优势</span></div>
${filtered.map(d=>`<div class="card card-white deal-card" onclick="openWebView('${escapeHtml(d.title)}','${escapeHtml(d.source)}')">
<div class="deal-img ${d.imgClass}">&#9827;</div>
<div class="deal-info"><div>
<div class="deal-title">${d.title}</div>
<div class="deal-tags">${d.tags.map(t=>`<span class="tag tag-yellow">${t}</span>`).join('')}</div></div>
<div>
<div class="deal-price-row"><span class="price">${d.price}</span><span class="price-ref">${d.ref}</span><span class="price-off">${d.off}</span></div>
<div class="deal-source">来源: ${d.source}</div></div></div>
</div>`).join('')}`;
}

// ===== WEBVIEW =====
function openWebView(title,source){
document.getElementById('webviewOverlay').classList.add('active');
document.getElementById('wvTitle').textContent=title;
document.getElementById('wvSource').textContent='来源: '+source;
document.getElementById('wvBody').innerHTML=`
<div class="wv-placeholder">
<div class="wv-icon">&#128240;</div>
<div class="wv-msg">${title}</div>
<div style="font-size:13px;color:var(--text-muted);margin-top:8px;">来源: ${source}</div>
<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">模拟 WebView 页面</div>
<a class="wv-link" href="javascript:void(0)" onclick="closeWebView()">关闭</a>
</div>`;
}
function closeWebView(){document.getElementById('webviewOverlay').classList.remove('active');}

// ===== TAB SWITCH =====
function switchTab(tab){
clearInterval(splashTimer);
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

if(tab==='splash'){
document.getElementById('page-splash').classList.add('active');
splashIndex=0;renderSplash();resetSplashTimer();
document.querySelector('.nav-item[data-page="splash"]').classList.add('active');
return;
}

const pageMap={home:'page-home',events:'page-events',topics:'page-topics',anime:'page-anime',deals:'page-deals'};
document.getElementById(pageMap[tab]).classList.add('active');
const navItem=document.querySelector(`.nav-item[data-page="${tab}"]`);
if(navItem) navItem.classList.add('active');

if(tab==='home') renderHome();
else if(tab==='events') renderEvents();
else if(tab==='topics') renderTopics();
else if(tab==='anime') renderAnime();
else if(tab==='deals') renderDeals();
document.getElementById('pageContainer').scrollTop=0;
}

// ===== INIT =====
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
renderSplash();
resetSplashTimer();
renderHome();
renderEvents();
renderTopics();
renderAnime();
renderDeals();
</script>
</body>
</html>
