<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marvis 项目中心</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height:100vh; font-family: 'SF Pro Display', 'PingFang SC', sans-serif; color:#fff; display:flex; align-items:center; justify-content:center; }
  .container { max-width:480px; width:100%; padding:40px 24px; }
  h1 { font-size:28px; font-weight:700; text-align:center; margin-bottom:8px; background: linear-gradient(135deg, #FF6B9D, #C084FC); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .subtitle { text-align:center; color:rgba(255,255,255,0.5); font-size:13px; margin-bottom:36px; }
  .card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:24px; margin-bottom:16px; transition: all 0.25s; text-decoration:none; display:block; }
  .card:hover { background:rgba(255,255,255,0.1); transform:translateY(-2px); border-color:rgba(255,107,157,0.3); }
  .card-icon { font-size:32px; margin-bottom:12px; }
  .card h2 { font-size:18px; color:#fff; margin-bottom:6px; }
  .card p { font-size:13px; color:rgba(255,255,255,0.5); line-height:1.5; }
  .card .tag { display:inline-block; background:rgba(192,132,252,0.2); color:#C084FC; font-size:11px; padding:2px 10px; border-radius:10px; margin-top:10px; }
  .footer { text-align:center; color:rgba(255,255,255,0.25); font-size:12px; margin-top:40px; }
</style>
</head>
<body>
<div class="container">
  <h1>Marvis 项目中心</h1>
  <p class="subtitle">AI 驱动的二次元社区 · 持续自动更新</p>

  <a class="card" href="anime-con/">
    <div class="card-icon">🎌</div>
    <h2>次元汇</h2>
    <p>20 部热番推荐 · 12 位 COSER · 漫展日历 · 天气适配推荐</p>
    <span class="tag">每日 12:00 自动更新</span>
  </a>

  <p class="footer">更多项目即将上线 · Powered by Marvis</p>
</div>
</body>
</html>
