<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AniCon - 二次元漫展资讯</title>
<style>
/* ========== DESIGN TOKENS ========== */
:root {
  --pink-100: #fce4ec;
  --pink-200: #f8bbd0;
  --pink-300: #f48fb1;
  --pink-400: #e8a0bf;
  --pink-500: #d47fa6;
  --pink-600: #c77dba;
  --pink-700: #b05a85;
  --blue-100: #e1f5fe;
  --blue-200: #b3e5fc;
  --blue-300: #a8d8ea;
  --blue-400: #7ec8e3;
  --blue-500: #5a8ca0;
  --yellow-200: #fef3c7;
  --yellow-300: #f5d782;
  --yellow-400: #e8b84e;
  --purple-200: #e8d5f5;
  --purple-300: #c0b0e0;
  --purple-500: #9b6db5;
  --orange-200: #ffe0b2;
  --orange-300: #f0a868;
  --bg: #faf5fb;
  --bg-card: #ffffff;
  --text-primary: #2d1b35;
  --text-secondary: #7a6885;
  --text-muted: #b5a3bf;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-h: 60px;
}

/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ========== DECORATIVE CANVAS ========== */
.decor-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}

/* ========== PAGE CONTAINER ========== */
.page-container{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:1;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.page{display:none;min-height:100%;transition:opacity .25s ease}
.page.active{display:block;animation:pageIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ========== SPLASH PAGE ========== */
.splash-page{background:linear-gradient(170deg, #fce4ec 0%, #f3d4e8 20%, #e8daf0 45%, #dce8f6 70%, #e8f2fa 100%);padding:0;position:relative;overflow:hidden;min-height:100%}
.splash-decor{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.splash-decor .orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35}
.splash-decor .orb:nth-child(1){width:220px;height:220px;background:var(--pink-400);top:-60px;right:-40px}
.splash-decor .orb:nth-child(2){width:180px;height:180px;background:var(--blue-300);bottom:20%;left:-60px}
.splash-decor .orb:nth-child(3){width:140px;height:140px;background:var(--yellow-300);bottom:40%;right:10%}
.splash-decor .orb:nth-child(4){width:160px;height:160px;background:var(--purple-300);top:40%;left:30%}
.splash-inner{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;padding:0 20px}
.splash-header{text-align:center;padding-top:max(60px, 15vh)}
.splash-logo{font-size:clamp(36px, 8vw, 48px);font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg, var(--pink-700) 0%, var(--purple-500) 40%, var(--blue-400) 70%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.splash-logo-sub{font-size:13px;color:var(--text-secondary);margin-top:8px;letter-spacing:4px;font-weight:500}
.splash-divider{width:40px;height:3px;background:linear-gradient(90deg, var(--pink-400), var(--purple-300));border-radius:2px;margin:16px auto 0}
.splash-carousel{flex:1;position:relative;margin:20px 0;min-height:280px}
.splash-slide{position:absolute;top:0;left:0;width:100%;transition:all .45s cubic-bezier(.4,0,.2,1);opacity:0;transform:translateX(30px) scale(.96);pointer-events:none}
.splash-slide.active{opacity:1;transform:translateX(0) scale(1);pointer-events:auto;position:relative}
.splash-card{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:20px;padding:22px 20px;box-shadow:0 4px 24px rgba(180,140,170,.15), 0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(255,255,255,.6);position:relative;overflow:hidden}
.splash-card::after{content:'';position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;background:rgba(232,160,191,.08)}
.splash-card .sc-tags{margin-bottom:10px;display:flex;gap:6px;flex-wrap:wrap}
.splash-card .sc-tag{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.sc-tag.pink{background:rgba(232,160,191,.18);color:var(--pink-700)}
.sc-tag.blue{background:rgba(168,216,234,.25);color:var(--blue-500)}
.sc-tag.yellow{background:rgba(245,215,130,.25);color:#b08630}
.sc-tag.purple{background:rgba(199,125,186,.15);color:var(--purple-500)}
.sc-tag.orange{background:rgba(240,168,104,.2);color:#c87030}
.splash-card .sc-title{font-size:18px;font-weight:800;line-height:1.45;margin-bottom:8px;color:var(--text-primary)}
.splash-card .sc-desc{font-size:13px;color:var(--text-secondary);line-height:1.65;margin-bottom:14px}
.splash-card .sc-meta{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text-muted)}
.splash-card .sc-meta span{display:flex;align-items:center;gap:3px}
.splash-dots{display:flex;justify-content:center;gap:8px;padding:12px 0}
.splash-dot{width:7px;height:7px;border-radius:50%;background:rgba(180,150,190,.35);transition:all .3s cubic-bezier(.4,0,.2,1);cursor:pointer}
.splash-dot.active{background:var(--pink-600);width:22px;border-radius:4px}
.splash-actions{display:flex;gap:12px;padding-bottom:max(30px, 5vh)}
.splash-actions .btn{flex:1;text-align:center;font-size:15px;font-weight:700;padding:14px;border-radius:28px;cursor:pointer;border:none;transition:all .2s}
.splash-actions .btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg, var(--pink-600), var(--pink-400));color:#fff;box-shadow:0 4px 16px rgba(199,125,186,.3)}
.btn-ghost{background:transparent;color:var(--text-secondary)}
.btn-ghost:active{background:rgba(199,125,186,.06)}

/* ========== HOME PAGE ========== */
.section{margin-bottom:22px}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;padding:0 16px}
.section-label{font-size:17px;font-weight:800;color:var(--text-primary);position:relative;padding-left:14px}
.section-label::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3.5px;background:linear-gradient(180deg, var(--pink-600), var(--pink-300));border-radius:2px}
.section-more{font-size:12px;color:var(--pink-600);font-weight:600;cursor:pointer;padding:4px 0}
.hscroll-wrap{padding:0 16px}
.hscroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:2px 0 4px}
.hscroll::-webkit-scrollbar{display:none}
.hs-card{min-width:136px;border-radius:16px;background:var(--bg-card);box-shadow:0 2px 12px rgba(180,150,180,.1);cursor:pointer;flex-shrink:0;transition:transform .18s ease;overflow:hidden}
.hs-card:active{transform:scale(.965)}
.hs-card .hs-cover{width:100%;height:90px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hs-card .hs-cover .hs-icon{font-size:36px;position:relative;z-index:1}
.hs-card .hs-cover::after{content:'';position:absolute;inset:0}
.hs-card .hs-body{padding:10px 12px 12px}
.hs-card .hs-title{font-size:12px;font-weight:700;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hs-card .hs-sub{font-size:10px;color:var(--text-muted);margin-top:4px}

/* Cover gradients */
.cov-pink{background:linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #e8a0bf 100%)}
.cov-blue{background:linear-gradient(135deg, #e1f5fe 0%, #b3e5fc 40%, #a8d8ea 100%)}
.cov-yellow{background:linear-gradient(135deg, #fef3c7 0%, #fde68a 40%, #f5d782 100%)}
.cov-purple{background:linear-gradient(135deg, #f3e8ff 0%, #e8d5f5 40%, #c0b0e0 100%)}
.cov-orange{background:linear-gradient(135deg, #fff3e0 0%, #ffe0b2 40%, #f0a868 100%)}

/* ========== EVENTS PAGE ========== */
.month-badge{display:inline-block;font-size:15px;font-weight:800;color:var(--pink-700);background:linear-gradient(135deg, rgba(232,160,191,.12), rgba(199,125,186,.08));padding:6px 16px;border-radius:12px;margin:8px 16px}
.event-card{background:var(--bg-card);border-radius:16px;padding:16px;margin:0 16px 10px;box-shadow:0 2px 10px rgba(180,150,180,.08);border-left:3.5px solid var(--pink-400);cursor:pointer;transition:transform .18s ease}
.event-card:active{transform:scale(.985)}
.event-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.event-name{font-size:16px;font-weight:800;line-height:1.3;flex:1}
.event-cd{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;background:rgba(240,168,104,.15);color:#c87030;white-space:nowrap;margin-left:8px}
.event-info{font-size:12px;color:var(--text-secondary);line-height:1.5;margin:2px 0}
.event-guests{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.guest-tag{padding:2px 10px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(168,216,234,.2);color:var(--blue-500)}
.guest-more{padding:2px 10px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(180,150,190,.12);color:var(--text-muted)}
.event-flow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.flow-tag{padding:3px 10px;border-radius:8px;font-size:10px;background:rgba(200,180,210,.1);color:var(--text-muted)}
.event-bottom{display:flex;justify-content:space-between;align-items:center}
.ticket-btn{padding:7px 18px;border-radius:18px;font-size:12px;font-weight:700;background:linear-gradient(135deg, var(--pink-600), var(--pink-400));color:#fff;border:none;cursor:pointer;box-shadow:0 3px 10px rgba(199,125,186,.2);transition:all .15s}
.ticket-btn:active{transform:scale(.96);opacity:.9}
.event-source{font-size:10px;color:var(--text-muted)}

/* ========== TOPICS PAGE ========== */
.filter-bar{display:flex;gap:7px;overflow-x:auto;padding:8px 16px 14px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.f-chip{padding:6px 15px;border-radius:18px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .2s;background:rgba(210,195,220,.25);color:var(--text-secondary);border:1px solid transparent}
.f-chip.active{background:var(--pink-600);color:#fff;border-color:var(--pink-600);box-shadow:0 3px 8px rgba(199,125,186,.25)}
.sort-row{display:flex;gap:16px;padding:0 16px 12px;font-size:12px;font-weight:600}
.sort-item{color:var(--text-muted);cursor:pointer;padding-bottom:3px;border-bottom:2px solid transparent;transition:all .15s}
.sort-item.active{color:var(--pink-600);border-bottom-color:var(--pink-600)}
.topic-card{background:var(--bg-card);border-radius:14px;padding:15px;margin:0 16px 10px;box-shadow:0 1px 8px rgba(180,150,180,.07);cursor:pointer;transition:transform .15s ease}
.topic-card:active{transform:scale(.985)}
.topic-title-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.topic-title{font-size:15px;font-weight:800;line-height:1.4;flex:1}
.topic-tags{margin-bottom:6px;display:flex;gap:5px;flex-wrap:wrap}
.t-tag{padding:2px 10px;border-radius:10px;font-size:10px;font-weight:600}
.t-tag.pink{background:rgba(232,160,191,.15);color:var(--pink-700)}
.t-tag.blue{background:rgba(168,216,234,.2);color:var(--blue-500)}
.t-tag.orange{background:rgba(240,168,104,.15);color:#c87030}
.t-tag.purple{background:rgba(199,125,186,.12);color:var(--purple-500)}
.t-tag.green{background:rgba(144,200,172,.18);color:#508068}
.topic-hot{font-size:10px;color:var(--text-muted);margin-bottom:8px}
.topic-quote{background:rgba(245,235,250,.5);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text-secondary);line-height:1.5;position:relative;margin-bottom:8px}
.topic-quote::before{content:'"';font-size:22px;color:var(--pink-300);position:absolute;left:7px;top:4px;opacity:.6}
.topic-quote{padding-left:24px}
.topic-footer{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted)}

/* ========== ANIME PAGE ========== */
.anime-card{display:flex;gap:12px;background:var(--bg-card);border-radius:14px;padding:13px;margin:0 16px 10px;box-shadow:0 1px 8px rgba(180,150,180,.07);cursor:pointer;transition:transform .15s ease;align-items:stretch}
.anime-card:active{transform:scale(.985)}
.anime-poster{width:72px;min-height:100px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.anime-poster .ap-icon{font-size:28px;position:relative;z-index:1}
.anime-info{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.anime-name{font-size:15px;font-weight:800;line-height:1.3;margin-bottom:4px}
.anime-genre{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.anime-desc{font-size:11px;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.anime-meta{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text-muted)}
.status-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700}
.status-airing{background:rgba(144,200,172,.2);color:#407860}
.status-upcoming{background:rgba(232,160,191,.15);color:var(--pink-700)}

/* Poster gradients */
.poster-1{background:linear-gradient(135deg, #fce4ec, #f8bbd0)}
.poster-2{background:linear-gradient(135deg, #e1f5fe, #b3e5fc)}
.poster-3{background:linear-gradient(135deg, #fef3c7, #fde68a)}
.poster-4{background:linear-gradient(135deg, #f3e8ff, #e8d5f5)}
.poster-5{background:linear-gradient(135deg, #fff3e0, #ffe0b2)}
.poster-6{background:linear-gradient(135deg, #e8f5e9, #c8e6c9)}

/* ========== COSER SUB PAGE ========== */
.sub-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;background:var(--bg);overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.sub-overlay.active{display:block;animation:slideIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.sub-top{display:flex;align-items:center;padding:12px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(210,190,220,.12)}
.sub-back{width:36px;height:36px;border-radius:50%;background:rgba(210,195,220,.25);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text-primary);margin-right:12px;transition:background .15s}
.sub-back:active{background:rgba(210,195,220,.4)}
.sub-title{font-size:16px;font-weight:800}
.waterfall{padding:10px 12px;column-count:2;column-gap:10px}
.wf-item{break-inside:avoid;margin-bottom:10px;border-radius:14px;overflow:hidden;background:var(--bg-card);box-shadow:0 2px 8px rgba(180,150,180,.08);cursor:pointer;transition:transform .15s ease}
.wf-item:active{transform:scale(.97)}
.wf-img{width:100%;display:flex;align-items:center;justify-content:center;position:relative}
.wf-img .wf-icon{font-size:44px;position:relative;z-index:1}
.wf-body{padding:10px 12px}
.wf-name{font-size:12px;font-weight:700;line-height:1.35}
.wf-sub{font-size:10px;color:var(--text-muted);margin-top:2px}

/* WF heights */
.wf-h1{height:180px}
.wf-h2{height:140px}
.wf-h3{height:160px}
.wf-h4{height:200px}
.wf-h5{height:150px}
.wf-h6{height:170px}

/* ========== DEALS PAGE ========== */
.deal-card{display:flex;gap:12px;background:var(--bg-card);border-radius:14px;padding:13px;margin:0 16px 10px;box-shadow:0 1px 8px rgba(180,150,180,.07);cursor:pointer;transition:transform .15s ease;align-items:stretch}
.deal-card:active{transform:scale(.985)}
.deal-img{width:80px;min-height:80px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.deal-img .di-icon{font-size:30px;position:relative;z-index:1}
.deal-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.deal-title{font-size:14px;font-weight:700;line-height:1.35;margin-bottom:2px}
.deal-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.deal-price-row{display:flex;align-items:baseline;gap:8px}
.d-price{font-size:17px;font-weight:800;color:#e07050}
.d-ref{font-size:11px;color:var(--text-muted);text-decoration:line-through}
.d-off{font-size:10px;font-weight:700;color:#e07050;background:rgba(224,112,80,.1);padding:1px 6px;border-radius:8px}
.deal-source{font-size:10px;color:var(--text-muted)}

/* ========== BOTTOM NAV ========== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(210,190,220,.12);display:flex;justify-content:space-around;align-items:center;padding:5px 4px calc(5px + var(--safe-bottom));height:calc(var(--nav-h) + var(--safe-bottom))}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;position:relative;transition:all .15s}
.nav-icon{font-size:22px;color:var(--text-muted);transition:all .15s;line-height:1}
.nav-label{font-size:9px;color:var(--text-muted);font-weight:600;transition:all .15s}
.nav-item.active .nav-icon{color:var(--pink-600)}
.nav-item.active .nav-label{color:var(--pink-600)}
.nav-item.active::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:18px;height:3px;background:var(--pink-600);border-radius:0 0 3px 3px}

/* ========== WEBVIEW OVERLAY ========== */
.wv-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);display:none;align-items:flex-end;justify-content:center}
.wv-overlay.active{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.wv-panel{width:100%;max-height:85%;background:#fff;border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.wv-top{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f2eaf5;background:#faf8fd}
.wv-back{width:30px;height:30px;border-radius:50%;background:rgba(210,195,220,.25);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;margin-right:12px}
.wv-tt{font-size:15px;font-weight:800;flex:1}
.wv-src{font-size:10px;color:var(--text-muted)}
.wv-body{flex:1;overflow-y:auto;padding:24px 20px;-webkit-overflow-scrolling:touch}
.wv-placeholder{text-align:center;padding:40px 0;color:var(--text-secondary)}
.wv-placeholder .wv-big{font-size:52px;margin-bottom:12px;opacity:.6}

/* ========== DECORATIVE SPARKLES ========== */
.sparkle{position:absolute;pointer-events:none;animation:sparkleFloat var(--dur) ease-in-out infinite;animation-delay:var(--delay)}
@keyframes sparkleFloat{0%,100%{opacity:0;transform:translateY(0) rotate(0deg) scale(.5)}50%{opacity:.7;transform:translateY(-16px) rotate(180deg) scale(1)}}

/* ========== RESPONSIVE FINE-TUNING ========== */
@media (min-width: 420px) {
  .hs-card{min-width:148px}
  .hs-card .hs-cover{height:100px}
}
</style>
</head>
<body>

<div id="app">
<div class="page-container" id="pageContainer">

<!-- ===== SPLASH ===== -->
<div class="page splash-page active" id="page-splash">
  <div class="splash-decor">
    <div class="orb"></div><div class="orb"></div><div class="orb"></div><div class="orb"></div>
    <div id="sparkles"></div>
  </div>
  <div class="splash-inner">
    <div class="splash-header">

let filtered=animeData;if(animeFilter!=='all')filtered=animeData.filter(a=>a.genre.includes(animeFilter));
el.innerHTML=`
<div class="filter-bar">${filters.map(f=>`<div class="f-chip${animeFilter===f?' active':''}" onclick="animeFilter='${f}';renderAnime()">${f==='all'?'全部':f}</div>`).join('')}</div>
<div class="sort-row"><span class="sort-item${animeSort==='hot'?' active':''}" onclick="animeSort='hot';renderAnime()">按热度</span><span class="sort-item${animeSort==='new'?' active':''}" onclick="animeSort='new';renderAnime()">按开播时间</span></div>
${filtered.map(a=>`<div class="anime-card" onclick="openWV('${esc(a.name)}','B站')">
<div class="anime-poster ${a.poster}"><span class="ap-icon">${a.icon}</span></div>
<div class="anime-info"><div>
<div class="anime-name">${a.name}</div>
<div class="anime-genre">${a.genre.map(g=>`<span class="t-tag blue">${g}</span>`).join('')}</div>
<div class="anime-desc">${a.desc}</div></div>
<div class="anime-meta"><span>${a.date}</span><span class="status-badge ${a.status==='airing'?'status-airing':'status-upcoming'}">${a.status==='airing'?'热播中':'即将开播'}</span></div>
</div></div>`).join('')}`;}

// ==================== COSER ====================
function openCoser(){document.getElementById('subCoser').classList.add('active');renderCoser()}
function closeCoser(){document.getElementById('subCoser').classList.remove('active')}
function renderCoser(){
const filters=['all','原神','鬼灭之刃','咒术回战','葬送的芙莉莲','我推的孩子'];
const fNames={all:'全部',原神:'原神',鬼灭之刃:'鬼灭',咒术回战:'咒术',葬送的芙莉莲:'芙莉莲',我推的孩子:'我推'};
let filtered=coserData;if(coserFilter!=='all')filtered=coserData.filter(c=>c.tags.includes(coserFilter));
document.getElementById('coserFilter').innerHTML=filters.map(f=>`<div class="f-chip${coserFilter===f?' active':''}" onclick="coserFilter='${f}';renderCoser()">${fNames[f]}</div>`).join('');
document.getElementById('coserGrid').innerHTML=filtered.map(c=>`<div class="wf-item" onclick="openWV('${esc(c.name)}','${esc(c.source)}')">
<div class="wf-img ${c.h} ${c.gradient}"><span class="wf-icon">📷</span></div>
<div class="wf-body"><div class="wf-name">${c.name}</div><div class="wf-sub">${c.tags.join(' · ')}</div><div class="wf-sub">${c.source}</div></div>
</div>`).join('');}

// ==================== DEALS ====================
function renderDeals(){const el=document.getElementById('page-deals');
const filters=['all','手办','挂画','徽章','服饰','玩偶','画集','应援'];
const fNames={all:'全部',手办:'手办',挂画:'挂画',徽章:'徽章',服饰:'服饰',玩偶:'玩偶',画集:'画集',应援:'应援'};
let filtered=dealData;if(dealFilter!=='all')filtered=dealData.filter(d=>d.tags.includes(dealFilter));
el.innerHTML=`
<div class="filter-bar">${filters.map(f=>`<div class="f-chip${dealFilter===f?' active':''}" onclick="dealFilter='${f}';renderDeals()">${fNames[f]}</div>`).join('')}</div>
<div class="sort-row"><span class="sort-item${dealSort==='price'?' active':''}" onclick="dealSort='price';renderDeals()">按价格</span><span class="sort-item${dealSort==='new'?' active':''}" onclick="dealSort='new';renderDeals()">按最新</span></div>
${filtered.map(d=>`<div class="deal-card" onclick="openWV('${esc(d.title)}','${esc(d.source)}')">
<div class="deal-img ${d.imgGrad}"><span class="di-icon">${d.icon}</span></div>
<div class="deal-body"><div>
<div class="deal-title">${d.title}</div>
<div class="deal-tags">${d.tags.map(t=>`<span class="t-tag yellow">${t}</span>`).join('')}</div></div>
<div><div class="deal-price-row"><span class="d-price">${d.price}</span><span class="d-ref">${d.ref}</span><span class="d-off">${d.off}</span></div>
<div class="deal-source">来源：${d.source}</div></div>
</div></div>`).join('')}`;}

// ==================== WEBVIEW ====================
function openWV(title,source){
document.getElementById('wvOverlay').classList.add('active');
document.getElementById('wvTitle').textContent=title;
document.getElementById('wvSource').textContent='来源：'+source;
document.getElementById('wvBody').innerHTML=`<div class="wv-placeholder">
<div class="wv-big">📰</div><p style="font-size:15px;font-weight:700">${title}</p>
<p style="font-size:12px;color:var(--text-muted);margin-top:8px">来源：${source}</p>
<p style="font-size:11px;color:var(--text-muted);margin-top:4px">示例详情页</p></div>`;}
function closeWV(){document.getElementById('wvOverlay').classList.remove('active')}

// ==================== TAB SWITCH ====================
function switchTab(tab){clearInterval(splashTimer);
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
if(tab==='splash'){document.getElementById('page-splash').classList.add('active');
splashIdx=0;renderSplash();resetSTimer();
document.querySelector('.nav-item[data-tab="splash"]').classList.add('active');return;}
const map={home:'page-home',events:'page-events',topics:'page-topics',anime:'page-anime',deals:'page-deals'};
document.getElementById(map[tab]).classList.add('active');
const ni=document.querySelector(`.nav-item[data-tab="${tab}"]`);if(ni)ni.classList.add('active');
if(tab==='home')renderHome();else if(tab==='events')renderEvents();
else if(tab==='topics')renderTopics();else if(tab==='anime')renderAnime();
else if(tab==='deals')renderDeals();
document.getElementById('pageContainer').scrollTop=0;}

// ==================== UTILS ====================
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}

// ==================== INIT ====================
renderSplash();resetSTimer();
renderHome();renderEvents();renderTopics();renderAnime();renderDeals();
</script>
</body>
</html>
